<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<title>Dark Player Pro</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
  overflow:hidden;
}

/* CANVAS */
#bg-canvas {
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

/* PLAYER BOX */
.player {
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:420px;
  background:rgba(0,0,0,0.7);
  padding:15px;
  border-radius:10px;
  text-align:center;
}

/* BUTTONS */
button {
  background:rgba(80,0,0,0.8);
  border:none;
  color:white;
  padding:10px 15px;
  margin:5px;
  cursor:pointer;
  border-radius:6px;
}

button:hover {
  background:rgba(150,0,0,0.9);
}

/* PROGRESS */
#progress {
  width:100%;
}

/* VIDEO */
#video-container {
  position:absolute;
  bottom:180px;
  left:50%;
  transform:translateX(-50%);
  width:420px;
}

video {
  width:100%;
  border-radius:10px;
}

/* PLAYLIST */
#playlist {
  max-height:100px;
  overflow-y:auto;
  margin-top:10px;
}

.track {
  cursor:pointer;
  padding:5px;
}

.track:hover {
  background:rgba(255,0,0,0.3);
}

/* BUG BUTTON */
#bug-open {
  position:fixed;
  top:20px;
  right:20px;
}

#bug-form {
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:black;
  padding:20px;
  border:1px solid red;
}
</style>
</head>

<body>

<canvas id="bg-canvas"></canvas>

<button id="bug-open" onclick="toggleBugForm()">🐛</button>

<div id="bug-form">
  <textarea id="bug-desc" placeholder="Bug beschreiben..."></textarea>
  <button onclick="submitBug()">Senden</button>
  <button onclick="toggleBugForm()">Close</button>
</div>

<!-- VIDEO -->
<div id="video-container">
  <video id="video" controls>
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
  </video>
</div>

<!-- PLAYER -->
<div class="player">

  <div>
    <button onclick="prev()">⏮</button>
    <button onclick="play()">▶</button>
    <button onclick="pause()">⏸</button>
    <button onclick="next()">⏭</button>
    <button onclick="toggleLoop()">🔁</button>
  </div>

  <input type="range" id="progress" value="0">

  <div>
    🔊 <input type="range" id="volume" min="0" max="1" step="0.01">
  </div>

  <div id="playlist"></div>

</div>

<audio id="audio"></audio>

<script>

/* TRACKLIST */
const tracks = [
  {
    name:"Epic Battle",
    src:"https://raw.githubusercontent.com/Kalirusi5511/dunkler-musik-player/main/epic-battle-music.mp3"
  },
  {
    name:"Test Track",
    src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
  }
];

let index = 0;
const audio = document.getElementById("audio");

/* LOAD TRACK */
function loadTrack(i){
  index = i;
  audio.src = tracks[i].src;
  renderPlaylist();
}

/* CONTROLS */
function play(){ audio.play(); }
function pause(){ audio.pause(); }

function next(){
  index = (index+1)%tracks.length;
  loadTrack(index);
  play();
}

function prev(){
  index = (index-1+tracks.length)%tracks.length;
  loadTrack(index);
  play();
}

/* LOOP */
function toggleLoop(){
  audio.loop = !audio.loop;
}

/* PROGRESS */
const progress = document.getElementById("progress");

audio.addEventListener("timeupdate",()=>{
  progress.value = (audio.currentTime / audio.duration)*100 || 0;
});

progress.addEventListener("input",()=>{
  audio.currentTime = (progress.value/100)*audio.duration;
});

/* VOLUME */
const volume = document.getElementById("volume");
volume.value = 0.5;
audio.volume = 0.5;

volume.addEventListener("input",()=>{
  audio.volume = volume.value;
});

/* PLAYLIST UI */
function renderPlaylist(){
  const list = document.getElementById("playlist");
  list.innerHTML="";
  
  tracks.forEach((t,i)=>{
    const div=document.createElement("div");
    div.className="track";
    div.innerText=(i===index?"▶ ":"")+t.name;
    div.onclick=()=>{
      loadTrack(i);
      play();
    };
    list.appendChild(div);
  });
}

/* BUG */
function toggleBugForm(){
  const f=document.getElementById("bug-form");
  f.style.display=f.style.display==="block"?"none":"block";
}

function submitBug(){
  const desc=document.getElementById("bug-desc").value;
  if(!desc) return alert("Beschreibe den Bug");

  const url="https://github.com/Kalirusi5511/dunkler-musik-player/issues/new?body="+encodeURIComponent(desc);
  window.location.href=url;
}

/* CANVAS */
const canvas=document.getElementById("bg-canvas");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.3)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for(let i=0;i<30;i++){
    ctx.strokeStyle="rgba(255,0,0,0.2)";
    ctx.beginPath();
    ctx.moveTo(Math.random()*canvas.width,Math.random()*canvas.height);
    ctx.lineTo(Math.random()*canvas.width,Math.random()*canvas.height);
    ctx.stroke();
  }

  requestAnimationFrame(draw);
}
draw();

/* INIT */
loadTrack(0);
renderPlaylist();

</script>

</body>
</html>
